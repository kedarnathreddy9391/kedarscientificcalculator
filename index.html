<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>

    <style>
        body {
            background: #1e1e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        .calculator {
            background: #2c2c2c;
            padding: 20px;
            border-radius: 15px;
            width: 350px;
        }

        #display {
            width: 100%;
            height: 60px;
            font-size: 28px;
            text-align: right;
            margin-bottom: 15px;
            padding-right: 10px;
            border: none;
            border-radius: 10px;
            background: white;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            height: 55px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #444;
            color: white;
        }

        button:hover {
            background: #666;
        }

        .equal {
            background: orange;
        }

        .equal:hover {
            background: darkorange;
        }

        .clear {
            background: crimson;
        }

        .clear:hover {
            background: darkred;
        }
    </style>
</head>

<body>

    <div class="calculator">

        <input type="text" id="display" >

        <div class="buttons">

            <button onclick="clearDisplay()" class="clear">C</button>
            <button onclick="deleteLast()">⌫</button>
            <button onclick="appendValue('(')">(</button>
            <button onclick="appendValue(')')">)</button>
            <button onclick="appendValue('/')">÷</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('*')">×</button>
            <button onclick="appendValue('%')">%</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('-')">−</button>
            <button onclick="square()">x²</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('+')">+</button>
            <button onclick="sqrt()">√</button>

            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button onclick="sin()">sin</button>
            <button onclick="cos()">cos</button>
            <button onclick="tan()">tan</button>

            <button onclick="log()">log</button>
            <button onclick="ln()">ln</button>
            <button onclick="pi()">π</button>
            <button onclick="euler()">e</button>
            <button onclick="calculate()" class="equal">=</button>

        </div>
    </div>

    <script>

        let display = document.getElementById("display");

        function appendValue(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = "";
        }

        function deleteLast() {
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            try {
                display.value = eval(display.value);
            } catch {
                display.value = "Error";
            }
        }

        function square() {
            display.value = Math.pow(eval(display.value), 2);
        }

        function sqrt() {
            display.value = Math.sqrt(eval(display.value));
        }

        function sin() {
            display.value = Math.sin(eval(display.value) * Math.PI / 180);
        }

        function cos() {
            display.value = Math.cos(eval(display.value) * Math.PI / 180);
        }

        function tan() {
            display.value = Math.tan(eval(display.value) * Math.PI / 180);
        }

        function log() {
            display.value = Math.log10(eval(display.value));
        }

        function ln() {
            display.value = Math.log(eval(display.value));
        }

        function pi() {
            display.value += Math.PI;
        }

        function euler() {
            display.value += Math.E;
        }

    </script>

</body>
</html>
