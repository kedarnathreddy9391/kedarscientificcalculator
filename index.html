<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>

    <style>
        body {
            background: #1e1e1e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial;
        }

        .calculator {
            background: #2c2c2c;
            padding: 20px;
            border-radius: 15px;
            width: 350px;
        }

        #display {
            width: 100%;
            height: 60px;
            font-size: 28px;
            text-align: right;
            margin-bottom: 15px;
            padding-right: 10px;
            border: none;
            border-radius: 10px;
            background: white;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            height: 55px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #444;
            color: white;
        }

        button:hover {
            background: #666;
        }

        .equal {
            background: orange;
        }

        .equal:hover {
            background: darkorange;
        }

        .clear {
            background: crimson;
        }

        .clear:hover {
            background: darkred;
        }
    </style>
</head>

<body>

    <div class="calculator">

        <input type="text" id="display" >

        <div class="buttons">

            <button onclick="clearDisplay()" class="clear">C</button>
            <button onclick="deleteLast()">⌫</button>
            <button onclick="appendValue('(')">(</button>
            <button onclick="appendValue(')')">)</button>
            <button onclick="appendValue('/')">÷</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('*')">×</button>
            <button onclick="appendValue('%')">%</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('-')">−</button>
            <button onclick="square()">x²</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('+')">+</button>
            <button onclick="sqrt()">√</button>

            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button onclick="sin()">sin</button>
            <button onclick="cos()">cos</button>
            <button onclick="tan()">tan</button>

            <button onclick="log()">log</button>
            <button onclick="ln()">ln</button>
            <button onclick="pi()">π</button>
            <button onclick="euler()">e</button>
            <button onclick="calculate()" class="equal">=</button>

        </div>
    </div>

    <script>

        let display = document.getElementById("display");
        let answerDisplayed = false;

        function appendValue(value) {

            if (display.value === "Error") {
                display.value = "";
            }
            if (answerDisplayed) {
                display.value = "";
                answerDisplayed = false;
            }

            display.value += value;
        }

        function clearDisplay() {
            display.value = "";
        }

        function deleteLast() {
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            try {

                let expression = display.value;

                expression = expression.replace(/π/g, Math.PI);
                expression = expression.replace(/e/g, Math.E);

                expression = expression.replace(/sin\(([^)]+)\)/g,
                    (_, x) => Math.sin(eval(x) * Math.PI / 180));

                expression = expression.replace(/cos\(([^)]+)\)/g,
                    (_, x) => Math.cos(eval(x) * Math.PI / 180));

                expression = expression.replace(/tan\(([^)]+)\)/g,
                    (_, x) => Math.tan(eval(x) * Math.PI / 180));

                expression = expression.replace(/sqrt\(([^)]+)\)/g,
                    (_, x) => Math.sqrt(eval(x)));

                expression = expression.replace(/log\(([^)]+)\)/g,
                    (_, x) => Math.log10(eval(x)));

                expression = expression.replace(/ln\(([^)]+)\)/g,
                    (_, x) => Math.log(eval(x)));

                display.value = eval(expression);
                
                answerDisplayed = true;

            } catch {
                display.value = "Error";
            }
        }

        function square() {

            if (display.value === "Error" || answerDisplayed) {
                display.value = "";
                answerDisplayed = false;
            }

            display.value += "**2";
        }

        function sqrt() {

            if (display.value === "Error" || answerDisplayed) {
                display.value = "";
                answerDisplayed = false;
            }

            display.value += "sqrt(";
        }

        function sin() {

            if (display.value === "Error" || answerDisplayed) {
                display.value = "";
                answerDisplayed = false;
            }

            display.value += "sin(";
        }

        function cos() {

             if (display.value === "Error" || answerDisplayed) {
                display.value = "";
                answerDisplayed = false;
            }

            display.value += "cos(";
        }

        function tan() {

            if (display.value === "Error" || answerDisplayed) {
                display.value = "";
                answerDisplayed = false;
            }

            display.value += "tan(";
        }

        function log() {

            if (display.value === "Error" || answerDisplayed) {
                display.value = "";
                answerDisplayed = false;
            }

            display.value += "log(";
        }

        function ln() {

            if (display.value === "Error" || answerDisplayed) {
                display.value = "";
                answerDisplayed = false;
            }

            display.value += "ln(";
        }

        function pi() {

            if (display.value === "Error" || answerDisplayed) {
                display.value = "";
                answerDisplayed = false;
            }

            display.value += "π";
        }

        function euler() {

            if (display.value === "Error" || answerDisplayed) {
                display.value = "";
                answerDisplayed = false;
            }

            display.value += "e";
        }

    </script>

</body>
</html>
